<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeffy Epstein Gallery</title>
    <style>
        :root {
            --bg: #050505;
            --fg: #EFEFEF;
            --muted: #555;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #fff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: crosshair;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            padding: 3vw;
        }

        /* Subtle Grain Overlay */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
            opacity: 0.03;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
        }

        header {
            margin-bottom: 10vh;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        h1 {
            font-size: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            color: var(--muted);
        }

        .collection-id {
            font-family: Georgia, serif;
            font-style: italic;
            font-size: 14px;
            color: var(--fg);
        }

        /* Responsive Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5vw;
        }

        .item {
            position: relative;
            background: #0a0a0a;
            aspect-ratio: 1/1.2;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: border-color 0.6s ease;
        }

        .item:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Placeholder for missing images */
        .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(0.9);
            opacity: 0.5;
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .item:hover img {
            filter: grayscale(0%) contrast(1);
            opacity: 1;
            transform: scale(1.05);
        }

        .item-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--fg);
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.6s ease;
        }

        .item:hover .item-info {
            opacity: 0.6;
            transform: translateY(0);
        }

        /* HUD Overlay */
        .controls {
            position: fixed;
            bottom: 40px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 1000;
        }

        .visualizer {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 14px;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .bar {
            width: 1px;
            height: 3px;
            background: var(--fg);
            transition: height 0.2s ease;
        }

        .active .bar {
            animation: bar_pulse 0.8s infinite ease-in-out;
        }

        @keyframes bar_pulse {
            0%, 100% { height: 3px; }
            50% { height: 14px; }
        }

        .bar:nth-child(2) { animation-delay: 0.2s; }
        .bar:nth-child(3) { animation-delay: 0.4s; }

        #audio-toggle {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            transition: color 0.3s ease;
            padding: 10px;
        }

        #audio-toggle:hover {
            color: var(--fg);
        }

        #hint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.8em;
            color: var(--muted);
            pointer-events: none;
            transition: opacity 1.5s ease;
            z-index: 100;
        }

        footer {
            margin-top: 15vh;
            padding-bottom: 5vh;
            border-top: 1px solid var(--border);
            padding-top: 4vh;
            text-align: center;
        }

        footer p {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            color: var(--muted);
        }

        @media (max-width: 600px) {
            body { padding: 8vw; }
            .gallery { grid-template-columns: 1fr; }
            header { flex-direction: column; gap: 10px; }
            .controls { right: 20px; bottom: 20px; }
        }
    </style>
</head>
<body>

    <div id="hint"></div>

    <header>
        <h1>Jeffy Epstein Gallery</h1>

    </header>

    <main class="gallery">
        <!-- Add your images to /assets/ folder -->
        <div class="item"><img src="assets/01.jpg" alt=""><div class="item-info">Plate_01</div></div>
        <div class="item"><img src="assets/02.jpg" alt=""><div class="item-info">Plate_02</div></div>
        <div class="item"><img src="assets/03.jpg" alt=""><div class="item-info">Plate_03</div></div>
        <div class="item"><img src="assets/04.jpg" alt=""><div class="item-info">Plate_04</div></div>
        <div class="item"><img src="assets/05.jpg" alt=""><div class="item-info">Plate_05</div></div>
        <div class="item"><img src="assets/06.jpg" alt=""><div class="item-info">Plate_06</div></div>
        <div class="item"><img src="assets/07.jpg" alt=""><div class="item-info">Plate_07</div></div>
        <div class="item"><img src="assets/08.jpg" alt=""><div class="item-info">Plate_08</div></div>
    </main>

    <footer>
        <p>© 2026 Crafted with Intent</p>
    </footer>

    <div class="controls">
        <div class="visualizer" id="viz">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <button id="audio-toggle"></button>
    </div>

    <!-- Music file should be in /assets/music.mp3 -->
    <audio id="background-track" loop src="assets/music.mp3"></audio>

    <script>
        const audio = document.getElementById('background-track');
        const btn = document.getElementById('audio-toggle');
        const viz = document.getElementById('viz');
        const hint = document.getElementById('hint');
        let initialized = false;

        function initialize() {
            if (initialized) return;
            
            audio.volume = 0;
            audio.play().then(() => {
                initialized = true;
                hint.style.opacity = '0';
                viz.style.opacity = '1';
                viz.classList.add('active');
                
                // Fade in audio
                let v = 0;
                const f = setInterval(() => {
                    if (v < 0.3) {
                        v += 0.02;
                        audio.volume = v;
                    } else {
                        clearInterval(f);
                    }
                }, 100);
            }).catch(() => { /* Autoplay block */ });
        }

        document.addEventListener('click', initialize);

        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (audio.muted) {
                audio.muted = false;
                viz.classList.add('active');
            } else {
                audio.muted = true;
                viz.classList.remove('active');
            }
        });
    </script>
</body>
</html>
